version: '3.8'

services:
  web:
    build: .
    container_name: unigest_web
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file:
      - .env
    # DB_HOST e DB_PORT devono essere configurati nel file .env
    # per puntare all'host (es. 172.17.0.1 o l'IP della macchina)
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - unigest_network

networks:
  unigest_network:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  logs_volume:
